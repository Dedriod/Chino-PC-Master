<section id="contacto" class="content-section">
    <h2 class="section-title">CONTACTO</h2>
    <div class="contact-container">
        <form id="contact-form" class="contact-form">
            <div class="form-group">
                <label for="contact-nombre">Nombre</label>
                <input type="text" id="contact-nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="contact-email">Email</label>
                <input type="email" id="contact-email" name="email" required>
            </div>
            <div class="form-group">
                <label for="contact-asunto">Asunto</label>
                <input type="text" id="contact-asunto" name="asunto" required>
            </div>
            <div class="form-group">
                <label for="contact-mensaje">Mensaje</label>
                <textarea id="contact-mensaje" name="mensaje" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn-submit">Enviar Mensaje</button>
        </form>
    </div>
</section>
