<section id="rifa-app" class="content-section rifa-booting">
    <!-- Solo visible hasta que initRifaApp termina; luego desvanece en 1.5s -->
    <div id="rifa-splash" class="rifa-splash" aria-live="polite" aria-busy="true">
        <img src="imagenes/Loading.gif" alt="Cargando datos de la rifa" class="rifa-splash-img" width="256" height="256" />
    </div>

    <!-- Logo que permanece fijo en la parte superior -->
    <div class="rifa-logo-container rifa-reveal-layer">
        <img src="imagenes/Extracción Logo.png" alt="Chino PC Master Logo" class="rifa-intro-logo">
    </div>

    <!-- Título con efecto aparición de caracteres (animación propia, no incluido en fade-in) -->
    <h2 class="section-title rifa-title-typing rifa-reveal-layer" id="rifa-titulo">SISTEMA DE RIFA</h2>
    
    <!-- Contenido principal (oculto al inicio) -->
    <div id="rifa-content" class="rifa-content rifa-reveal-layer" style="pointer-events: none;">
        <!-- VISTA GRÁFICA -->
        <div id="vista-grafica" class="rifa-vista active">
        <!-- Botones de navegación -->
        <div class="rifa-nav-buttons">
            <button id="btn-descargar" class="btn-rifa-action" title="Descargar como imagen">
                <img src="imagenes/Cámara.png" alt="Descargar" class="btn-icon">
            </button>
            <button id="btn-ver-lista" class="btn-rifa-action" title="Ver lista de números">
                <img src="imagenes/Lista.png" alt="Lista" class="btn-icon">
            </button>
            <button type="button" id="btn-config" class="btn-rifa-action btn-config-right btn-config-trigger" title="Configuración (hoja Config)">
                <img src="imagenes/Config.png" alt="Configuración" class="btn-icon">
            </button>
        </div>

        <!-- Grid de números -->
        <div class="numbers-grid-wrapper">
            <div id="numbers-grid" class="numbers-grid">
                <!-- Se cargará dinámicamente -->
            </div>
        </div>

        <!-- Panel de selección -->
        <div id="panel-seleccion" class="rifa-panel" style="display: none;">
            <h4>Actualizar Números Seleccionados</h4>
            <div class="form-group">
                <label for="input-nombre">Nombre/Cliente</label>
                <input type="text" id="input-nombre" placeholder="Nombre del comprador">
            </div>
            <div class="form-group">
                <label for="select-estado">Estado</label>
                <select id="select-estado">
                    <option value="Disponible">Disponible</option>
                    <option value="Reservado">Reservado</option>
                    <option value="Pagado">Pagado</option>
                </select>
            </div>
            <button id="btn-guardar-seleccion" class="btn-submit" style="width: 100%;">Actualizar Estado</button>
            <button id="btn-cancelar-seleccion" class="btn-cancelar" style="width: 100%; margin-top: 10px;">Cancelar</button>
        </div>

        <!-- Estadísticas -->
        <div class="rifa-stats">
            <div class="stat-card">
                <span class="stat-label">Total Números</span>
                <span id="stat-total" class="stat-value">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Disponibles</span>
                <span id="stat-available" class="stat-value">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Reservados</span>
                <span id="stat-reserved" class="stat-value">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Pagados</span>
                <span id="stat-paid" class="stat-value">0</span>
            </div>
        </div>

        <!-- Indicador de carga -->
        <div id="loading-indicator" class="loading-indicator">
            <p>Cargando datos de la rifa...</p>
        </div>
    </div>

    <!-- CANVAS OCULTO PARA EXPORTAR JPG (html2canvas) -->
    <div id="canvas-render" class="rifa-reveal-layer">
        <img id="b-logo" style="width: 450px; margin-bottom: 25px;" crossorigin="anonymous" />
        <div id="b-obj" class="canvas-brand-title" style="text-align: center; margin-bottom: 24px; color: white;"></div>
        <div id="b-grid" class="b-grid"></div>
        <div style="margin-top: auto; text-align: center; width: 100%; padding-bottom: 60px;">
            <h2 id="b-precio" style="font-size: 40px; margin: 10px 0; color: white;"></h2>
            <h3 id="b-mod-fecha" style="font-size: 30px; margin: 10px 0; font-weight: 400; color: white; white-space: nowrap;"></h3>
            <div class="wa-container">
                <img id="b-wa-icon" style="width: 70px;" crossorigin="anonymous" />
                <span id="b-wa-num" class="canvas-brand-phone"></span>
            </div>
        </div>
    </div>

    <!-- VISTA LISTA -->
    <div id="vista-lista" class="rifa-vista rifa-reveal-layer">
        <!-- Botones de navegación -->
        <div class="rifa-nav-buttons">
            <button id="btn-volver" class="btn-rifa-action" title="Volver a vista gráfica">
                <img src="imagenes/Regresar.png" alt="Volver" class="btn-icon">
            </button>
            <button id="btn-guardar-cambios" class="btn-rifa-action" title="Guardar todos los cambios">
                <img src="imagenes/Guardar.png" alt="Guardar" class="btn-icon">
            </button>
            <button type="button" id="btn-config-lista" class="btn-rifa-action btn-config-right btn-config-trigger" title="Configuración (hoja Config)">
                <img src="imagenes/Config.png" alt="Configuración" class="btn-icon">
            </button>
        </div>

        <!-- Tabla de Lista -->
        <div class="rifa-table-wrapper">
            <table class="rifa-tabla">
                <thead>
                    <tr>
                        <th style="width: 10%;">#</th>
                        <th style="width: 50%;">Cliente / Nombre</th>
                        <th style="width: 40%;">Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    <!-- Se cargará dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>
    </div>

    <!-- Modal fuera de #rifa-content para quedar por encima del logo (stacking context) -->
    <div id="rifa-config-modal" class="rifa-config-modal" aria-hidden="true" hidden>
        <div class="rifa-config-backdrop" id="rifa-config-backdrop"></div>
        <div class="rifa-config-dialog" role="dialog" aria-labelledby="rifa-config-titulo">
            <div class="rifa-config-head">
                <h3 id="rifa-config-titulo">Configuración</h3>
                <button type="button" id="rifa-config-cerrar-x" class="rifa-config-cerrar-x" aria-label="Cerrar">×</button>
            </div>
            <p class="rifa-config-hint">Filas 2 a 6 de la hoja Config (objeto, fecha, modalidad, WhatsApp y precio).</p>
            <div id="rifa-config-fields" class="rifa-config-fields"></div>
            <div class="rifa-config-actions">
                <button type="button" id="rifa-config-guardar" class="btn-submit rifa-config-btn-primary">Guardar en hoja</button>
                <button type="button" id="rifa-config-cerrar" class="btn-cancelar rifa-config-btn-secondary">Cancelar</button>
            </div>
        </div>
    </div>
</section>
