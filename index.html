<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chino PC Master | Autoridad Técnica</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@700&family=Roboto+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=11">
</head>
<body>

    <header class="site-header">
        <nav class="navbar" aria-label="Navegación principal">
            <button
                type="button"
                class="nav-toggle"
                id="hamburger-menu"
                aria-expanded="false"
                aria-controls="mobile-sidebar"
                aria-label="Abrir menú de navegación"
            >
                <span class="nav-toggle__icon" aria-hidden="true">☰</span>
            </button>
            <a href="#" class="nav-logo nav-logo--bar" id="home-link">
                <img src="imagenes/Extracción Logo.png" alt="Chino PC Master Logo" class="logo-img">
            </a>
            <ul class="nav-links nav-links--desktop">
                <li><a href="#soluciones" data-page="soluciones">Soluciones</a></li>
                <li><a href="#trayectoria" data-page="trayectoria">Trayectoria</a></li>
                <li><a href="#canje" data-page="canje">Canje</a></li>
                <li class="dropdown" id="webapps-nav-item" hidden>
                    <button type="button" class="dropdown-btn" id="webapps-menu-btn" aria-expanded="false" aria-haspopup="true" aria-controls="webapps-dropdown-menu">WebApps</button>
                    <div id="webapps-dropdown-menu" class="dropdown-menu" role="menu">
                        <a href="#rifa" class="dropdown-item" data-page="rifa" data-requires-permission="rifa" role="menuitem" hidden>Rifa</a>
                        <a href="#certificados" class="dropdown-item" data-page="certificados" data-requires-admin="true" role="menuitem" hidden>Certificados</a>
                        <a href="#admin" class="dropdown-item" data-page="admin" data-requires-admin="true" role="menuitem" hidden>Panel Admin</a>
                    </div>
                </li>
                <li><a href="#contacto" data-page="contacto" class="btn-contacto">Contacto</a></li>
            </ul>
            <div class="nav-end">
                <span id="auth-greeting" class="auth-greeting" hidden></span>
                <div class="auth-nav-pair">
                    <button type="button" id="btn-login-open" class="btn-auth btn-auth--login">Login</button>
                    <button type="button" id="btn-register-open" class="btn-auth btn-auth--register">Registro</button>
                </div>
                <button type="button" id="btn-logout" class="btn-auth btn-auth--logout" hidden>Cerrar sesión</button>
            </div>
        </nav>

        <div id="nav-overlay" class="nav-overlay" aria-hidden="true"></div>
        <aside
            id="mobile-sidebar"
            class="mobile-sidebar"
            aria-hidden="true"
            aria-label="Menú de navegación"
        >
            <div class="mobile-sidebar__top">
                <button type="button" class="mobile-sidebar__close" id="mobile-sidebar-close" aria-label="Cerrar menú">×</button>
                <div class="mobile-sidebar__logo-wrap">
                    <a href="#" class="mobile-sidebar__logo-link" id="sidebar-home-link" aria-label="Ir al inicio">
                        <img
                            src="imagenes/Extracción Logo.png"
                            alt="Chino PC Master Logo"
                            class="mobile-sidebar__logo-img"
                            width="200"
                            height="67"
                        >
                    </a>
                </div>
            </div>
            <nav class="mobile-sidebar__nav" aria-label="Navegación principal">
                <div id="mobile-webapps-block" class="mobile-sidebar__block" hidden>
                    <span class="mobile-sidebar__label">WebApps</span>
                    <ul class="mobile-sidebar__sublist">
                        <li><a href="#rifa" class="mobile-sidebar__link" data-page="rifa" data-requires-permission="rifa" hidden>Rifa</a></li>
                        <li><a href="#certificados" class="mobile-sidebar__link" data-page="certificados" data-requires-admin="true" hidden>Certificados</a></li>
                        <li><a href="#admin" class="mobile-sidebar__link" data-page="admin" data-requires-admin="true" hidden>Panel Admin</a></li>
                    </ul>
                </div>
                <ul class="mobile-sidebar__list mobile-sidebar__list--bottom">
                    <li><a href="#soluciones" data-page="soluciones" class="mobile-sidebar__link">Soluciones</a></li>
                    <li><a href="#trayectoria" data-page="trayectoria" class="mobile-sidebar__link">Trayectoria</a></li>
                    <li><a href="#canje" data-page="canje" class="mobile-sidebar__link">Canje</a></li>
                    <li><a href="#contacto" data-page="contacto" class="mobile-sidebar__link mobile-sidebar__link--cta">Contacto</a></li>
                </ul>
            </nav>
        </aside>
    </header>

    <main>
        <div id="main-content">
            <!-- El contenido se carga dinámicamente aquí -->
        </div>
    </main>

    <footer>
        <p class="tech-font">© 2026 CHINO PC MASTER // ESTADO: OPERATIVO</p>
    </footer>

    <div id="auth-message" class="auth-message" aria-live="polite"></div>

    <div id="auth-modal" class="auth-modal" hidden>
        <div id="auth-backdrop" class="auth-modal-backdrop"></div>
        <div class="auth-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
            <div class="auth-modal-head">
                <h3 id="auth-modal-title">Autenticacion</h3>
                <button id="auth-modal-close" class="auth-modal-close" type="button" aria-label="Cerrar">
                    ×
                </button>
            </div>
            <div class="auth-modal-tabs" role="tablist" aria-label="Login y Registro">
                <button id="tab-login" class="auth-tab active" role="tab" aria-selected="true" type="button">Login</button>
                <button id="tab-register" class="auth-tab" role="tab" aria-selected="false" type="button">Registro</button>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-identificador">Identificador (Username o Email)</label>
                    <input id="login-identificador" name="identificador" type="text" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Contrasena</label>
                    <input id="login-password" name="password" type="password" required autocomplete="current-password">
                </div>
                <button class="btn-submit" type="submit">Iniciar Sesion</button>
            </form>

            <form id="register-form" class="auth-form" hidden>
                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input id="register-username" name="username" type="text" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input id="register-email" name="email" type="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="register-email-confirm">Confirmar Email</label>
                    <input id="register-email-confirm" name="emailConfirm" type="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="register-password">Contrasena</label>
                    <input id="register-password" name="password" type="password" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="register-password-confirm">Confirmar Contrasena</label>
                    <input id="register-password-confirm" name="passwordConfirm" type="password" required autocomplete="new-password">
                </div>
                <button class="btn-submit" type="submit">Crear Cuenta</button>
            </form>
        </div>
    </div>

    <script src="assets/app.js?v=14"></script>

</body>
</html>
